name: YouTube Daily Summary

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  

    - name: Set up Python
      uses: actions/setup-python@v5 
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run main script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python main.py

    - name: Commit and Push state file
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 增加判断：只有当 json 文件存在时才去提交，防止 128 错误
        if [ -f last_video.json ]; then
          git add last_video.json
          git commit -m "Update last processed video" || echo "No changes to commit"
          git push || echo "Nothing to push"
        else
          echo "last_video.json does not exist. Skipping git commit."
        fi